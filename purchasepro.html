<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PurchasePro — Purchasing Performance</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0F172A;--sidebar:#1E293B;--card:#1E293B;--border:#334155;
  --text:#E2E8F0;--muted:#64748B;--sub:#94A3B8;
  --blue:#3B82F6;--green:#10B981;--amber:#F59E0B;--rose:#F43F5E;
  --purple:#A78BFA;--teal:#14B8A6;--sky:#38BDF8;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:200;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.sidebar.closed{transform:translateX(-100%)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:190;backdrop-filter:blur(2px)}
.sidebar-overlay.show{display:block}
.main{flex:1;margin-left:220px;display:flex;flex-direction:column;min-width:0;transition:margin .25s}
.main.full{margin-left:0}

/* ── TOPBAR ── */
.topbar{background:var(--sidebar);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.search-box{flex:1;max-width:280px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 12px;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--sub)}
.icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;position:relative;padding:4px;display:flex;align-items:center}
.notif-dot{position:absolute;top:0;right:0;background:var(--rose);width:8px;height:8px;border-radius:50%;border:2px solid var(--sidebar)}
.user-avatar{width:32px;height:32px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.menu-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;display:flex;align-items:center;padding:4px}

/* ── SIDEBAR NAV ── */
.brand{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon i{font-size:18px;color:#fff}
.brand-name{font-size:13px;font-weight:700;color:#F1F5F9}
.brand-sub{font-size:10px;color:var(--muted)}
.nav-section{padding:10px 12px 4px;font-size:10px;color:#475569;letter-spacing:.07em;font-weight:700;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:7px;cursor:pointer;color:var(--sub);margin:1px 6px;font-size:12.5px;font-weight:500;transition:background .15s,color .15s}
.nav-item:hover{background:var(--border);color:var(--text)}
.nav-item.active{background:var(--blue);color:#fff}
.nav-item i{font-size:16px;width:18px;flex-shrink:0}
.nav-item .chev{margin-left:auto;font-size:11px;opacity:.4}

/* ── CONTENT ── */
.content{padding:16px;flex:1}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.page-title{font-size:18px;font-weight:700;color:#F1F5F9;margin-bottom:2px}
.page-sub{font-size:12px;color:var(--muted)}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.kpi-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.kpi-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-icon i{font-size:17px}
.kpi-label{font-size:11px;color:var(--muted);font-weight:500;line-height:1.3}
.kpi-value{font-size:18px;font-weight:700;color:#F1F5F9;line-height:1.2}
.kpi-change{font-size:11px;display:flex;align-items:center;gap:3px;margin-top:3px}
.up{color:var(--green)}.down{color:var(--rose)}

/* ── CHART SVG ── */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.chart-title{font-size:13px;font-weight:600;color:#F1F5F9;margin-bottom:10px}
.charts-row{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:14px}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:500px}
th{font-size:10px;color:var(--muted);font-weight:600;text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
td{font-size:12px;color:var(--text);padding:8px 10px;border-bottom:1px solid #1E293B;vertical-align:middle}
tr:last-child td{border-bottom:none}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}

/* ── PROGRESS ── */
.progress-track{background:#0F172A;border-radius:3px;overflow:hidden}
.progress-fill{border-radius:3px;transition:width .5s}

/* ── FILTER PILLS ── */
.pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.pill.active{border-color:var(--blue);background:rgba(59,130,246,.15);color:var(--blue)}
.pill.blue.active{border-color:var(--blue);background:rgba(59,130,246,.15);color:var(--blue)}
.pill.green.active{border-color:var(--green);background:rgba(16,185,129,.15);color:var(--green)}
.pill.amber.active{border-color:var(--amber);background:rgba(245,158,11,.15);color:var(--amber)}
.pill.rose.active{border-color:var(--rose);background:rgba(244,63,94,.15);color:var(--rose)}

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sidebar);border-top:1px solid var(--border);z-index:150;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.bottom-nav-items{display:flex;justify-content:space-around}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 8px;cursor:pointer;color:var(--muted);min-width:52px;transition:color .15s}
.bn-item.active{color:var(--blue)}
.bn-item i{font-size:22px}
.bn-item span{font-size:9px;font-weight:600}

/* ── GRIDS responsive ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.qa-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px;background:#0F172A;border-radius:8px;cursor:pointer;transition:.15s}
.qa-item:hover{background:var(--border)}
.qa-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.qa-icon i{font-size:18px}
.qa-label{font-size:9px;color:var(--muted);text-align:center;line-height:1.3}

/* ── BAR ITEM ── */
.bar-item{margin-bottom:10px}
.bar-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}

/* ── SUPPLIER CARD ── */
.sup-cards{display:grid;grid-template-columns:1fr;gap:10px}
.sup-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .15s}
.sup-card.best{border-color:var(--green)}
.sup-meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0}
.sup-meta{background:#0F172A;border-radius:6px;padding:8px 10px}
.sup-meta-label{font-size:9px;color:var(--muted)}
.sup-meta-val{font-size:12px;font-weight:600}

/* ── CALC ── */
.level-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.level-card{border-radius:12px;padding:16px;text-align:center}
.level-price{font-size:20px;font-weight:700;color:#F1F5F9;margin:8px 0}
.level-meta{background:#0F172A;border-radius:8px;padding:10px}
.level-gpm{font-size:18px;font-weight:700}

/* ── AI INSIGHT ── */
.ai-item{display:flex;gap:10px;padding:10px;background:#0F172A;border-radius:8px;margin-bottom:8px}
.ai-dot{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-dot i{font-size:15px}
.ai-text{font-size:11px;color:var(--sub);line-height:1.6}

/* ── REALISASI ── */
.real-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.real-big{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}

/* ── PRICING ── */
.price-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.price-meta-item{background:#0F172A;border-radius:6px;padding:8px 10px}

/* ── ANIMATIONS ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pulse{animation:pulse 1.6s infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease forwards}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .main.full{margin-left:0}
  .bottom-nav{display:block}
  .content{padding:12px;padding-bottom:80px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .charts-row{grid-template-columns:1fr}
  .grid-2{grid-template-columns:1fr}
  .grid-3{grid-template-columns:1fr 1fr}
  .grid-4{grid-template-columns:1fr 1fr}
  .qa-grid{grid-template-columns:repeat(4,1fr)}
  .page-title{font-size:16px}
  .kpi-value{font-size:16px}
  .level-cards{grid-template-columns:1fr 1fr}
  .real-summary{grid-template-columns:1fr}
  .sup-meta-grid{grid-template-columns:repeat(3,1fr)}
  .price-meta{grid-template-columns:repeat(2,1fr)}
  .hidden-mobile{display:none}
  .topbar .search-box{display:none}
  .user-name-text{display:none}
}
@media(min-width:769px){
  .kpi-grid{grid-template-columns:repeat(4,1fr)}
  .charts-row{grid-template-columns:1fr 1fr}
  .qa-grid{grid-template-columns:repeat(8,1fr)}
  .sup-cards{grid-template-columns:1fr 1fr}
  .real-summary{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

// ─── MINI SVG CHART ──────────────────────────────────────────────────────────
function miniChart(data,color,h=90){
  const w=360;
  const mn=Math.min(...data),mx=Math.max(...data);
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*w;
    const y=h-((v-mn)/(mx-mn||1))*(h-12)-6;
    return `${x},${y}`;
  });
  const circles=data.map((v,i)=>{
    const x=(i/(data.length-1))*w;
    const y=h-((v-mn)/(mx-mn||1))*(h-12)-6;
    return `<circle cx="${x}" cy="${y}" r="3.5" fill="${color}"/>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px">
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>
    ${circles}
  </svg>`;
}

function monthLabels(){
  return `<div style="display:flex;justify-content:space-between;margin-top:4px">${MONTHS.map(m=>`<span style="font-size:9px;color:var(--muted)">${m}</span>`).join('')}</div>`;
}

// ─── DONUT SVG ───────────────────────────────────────────────────────────────
function donutChart(data,colors,size=140){
  const total=data.reduce((a,b)=>a+b,0);
  let ang=-Math.PI/2;
  const r=52,cx=size/2,cy=size/2;
  const slices=data.map((v,i)=>{
    const a=(v/total)*2*Math.PI;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
    ang+=a;
    const x2=cx+r*Math.cos(ang),y2=cy+r*Math.sin(ang);
    const lg=a>Math.PI?1:0;
    return `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} Z" fill="${colors[i]}"/>`;
  }).join('');
  return `<svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px;flex-shrink:0">
    ${slices}
    <circle cx="${cx}" cy="${cy}" r="${r*0.62}" fill="var(--card)"/>
    <text x="${cx}" y="${cy-5}" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="700">12.45M</text>
    <text x="${cx}" y="${cy+10}" text-anchor="middle" fill="var(--muted)" font-size="9">Total</text>
  </svg>`;
}

// ─── PAGE: PARETO ────────────────────────────────────────────────────────────
function pagePareto(){
  const ts=PRODUCTS.reduce((a,b)=>a+b.sales,0);
  const tq=PRODUCTS.reduce((a,b)=>a+b.qty,0);
  let cs=0,cq=0;
  const sorted=[...PRODUCTS].sort((a,b)=>b.sales-a.sales).map(p=>{
    cs+=p.sales;cq+=p.qty;
    const ps=(cs/ts)*100,pq=(cq/tq)*100;
    const pN=ps<=80,pQ=pq<=80;
    return{...p,ps:ps.toFixed(1),pq:pq.toFixed(1),pN,pQ,wajib:pN&&pQ};
  });
  return `
<div class="page-header"><div><div class="page-title">Pareto Pembelian & Penjualan</div><div class="page-sub">Identifikasi produk yang wajib dijaga stoknya</div></div></div>
<div class="grid-3" style="margin-bottom:14px">
  <div class="card" style="border-color:var(--rose);text-align:center">
    <div style="font-size:22px;font-weight:700;color:var(--rose)">${sorted.filter(p=>p.wajib).length}</div>
    <div style="font-size:11px;color:var(--muted)">Produk WAJIB JAGA STOK</div>
  </div>
  <div class="card" style="border-color:var(--green);text-align:center">
    <div style="font-size:22px;font-weight:700;color:var(--green)">${sorted.filter(p=>p.pN).length}</div>
    <div style="font-size:11px;color:var(--muted)">Pareto Nilai</div>
  </div>
  <div class="card" style="border-color:var(--blue);text-align:center">
    <div style="font-size:22px;font-weight:700;color:var(--blue)">${sorted.filter(p=>p.pQ).length}</div>
    <div style="font-size:11px;color:var(--muted)">Pareto QTY</div>
  </div>
</div>
<div class="card">
  <div class="table-wrap">

      <tbody>${sorted.map(p=>`<tr style="${p.wajib?'background:rgba(244,63,94,.06)':''}">
        <td>${sku(p.sku)}</td>
        <td style="font-weight:600;min-width:130px">${p.name}</td>
        <td style="white-space:nowrap">Rp ${fmt(p.sales)}</td>
        <td>${p.ps}%</td>
        <td>${p.pq}%</td>

      </tr>`).join('')}</tbody>

  </div>
</div>`;
}

  const retail=Math.ceil(hpp/(1-margin/100)/100)*100;
  const levels=[
    {name:'RETAIL',price:retail,pct:'100%',c:'#3B82F6'},
    {name:'HORECAP',price:Math.round(retail*.75),pct:'75% dari Retail',c:'#10B981'},
    {name:'AGEN',price:Math.round(retail*.5),pct:'50% dari Retail',c:'#F59E0B'},
    {name:'MITRA',price:Math.round(retail*.25),pct:'25% dari Retail',c:'#A78BFA'},
  ];
  document.getElementById('level-cards').innerHTML=levels.map(l=>{
    const laba=l.price-hpp;
    const g=l.price>0?((laba/l.price)*100).toFixed(1):0;
    return\`<div class="level-card" style="background:var(--card);border:2px solid \${l.c}">

        <div class="level-gpm" style="color:\${laba>0?'var(--green)':'var(--rose)'}">GPM \${g}%</div>
      </div>
    </div>\`;
  }).join('');
}
calcHarga();
<\/script>`;
}

function filterKec(cat,btn,clr){
  document.querySelectorAll('#kec-pills .pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#kec-body tr').forEach(r=>{
    r.style.display=(cat==='ALL'||r.dataset.cat===cat)?'':'none';
  });
}

// ─── PAGE: SERVICE LEVEL ─────────────────────────────────────────────────────
function pageServiceLevel(){
  return `
<div class="page-header"><div><div class="page-title">Service Level Supplier</div><div class="page-sub">% pemenuhan PO per supplier & SKU</div></div></div>
<div class="sup-cards" style="margin-bottom:14px">
  ${SUPPLIERS.map(s=>`<div class="card" style="border-color:${statusColor(s.status)}55">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px">
      <div style="font-weight:700;font-size:14px;color:#F1F5F9">${s.name}</div>
      ${badge(s.status,statusColor(s.status))}
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="font-size:36px;font-weight:700;color:${statusColor(s.status)}">${s.sl}%</div>
      <div style="flex:1">
        ${progBar(s.sl,statusColor(s.status),10)}
        <div style="font-size:10px;color:var(--muted);margin-top:4px">Level: <span style="color:${levelColor(s.level)}">${s.level}</span> · TOP: ${s.top} hari</div>
      </div>
    </div>
  </div>`).join('')}
</div>
<div class="card">
  <div class="chart-title" style="margin-bottom:10px">Legend Service Level</div>
  <div style="display:flex;flex-wrap:wrap;gap:10px">
    ${[['≥95%','EXCELLENT','var(--green)'],['85-94%','GOOD','var(--blue)'],['70-84%','FAIR','var(--amber)'],['<70%','POOR','var(--rose)']].map(([range,label,color])=>`<div style="display:flex;align-items:center;gap:6px;font-size:12px">
      <div style="width:10px;height:10px;border-radius:50%;background:${color}"></div>
      <span style="color:var(--muted)">${range}</span>
      ${badge(label,color)}
    </div>`).join('')}
  </div>
</div>`;
}

// ─── PAGE: SKU ───────────────────────────────────────────────────────────────
function pageSku(){
  return `
<div class="page-header"><div><div class="page-title">SKU & Barang</div><div class="page-sub">Master data produk</div></div></div>
<div class="card">
  <div class="table-wrap">
    <table>
      <thead><tr><th>SKU</th><th>Nama Barang</th><th>Group</th><th>HPP</th><th>Retail</th><th>GPM</th><th>Jual/Hari</th></tr></thead>
      <tbody>${PRODUCTS.map(p=>`<tr>
        <td>${sku(p.sku)}</td>
        <td style="font-weight:600;min-width:130px">${p.name}</td>
        <td style="color:var(--blue)">${p.group}</td>
        <td style="white-space:nowrap">Rp ${fmt(p.hpp)}</td>
        <td style="white-space:nowrap">Rp ${fmt(p.retail)}</td>
        <td style="color:var(--green);font-weight:700">${gpm(p.retail,p.hpp)}%</td>
        <td style="color:${p.spd>0?'var(--text)':'var(--rose)'}">${p.spd>0?p.spd+' pcs':'—'}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>
</div>`;
}
